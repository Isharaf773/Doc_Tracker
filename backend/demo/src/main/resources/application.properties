spring.application.name=doctrack-backend

# MySQL datasource (update username/password as needed)
spring.datasource.url=jdbc:mysql://localhost:3306/doctrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=change_me
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Allow CORS from local frontend during development
spring.mvc.cors.allowed-origins=http://127.0.0.1:5173,http://localhost:5173
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
